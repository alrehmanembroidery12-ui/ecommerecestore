<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Premium Lifestyle Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <a href="#" class="logo">AURA.</a>
        <ul class="nav-menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Collections</a></li>
            <li><a href="#">Our Story</a></li>
        </ul>
        <div class="header-icons">
            <a href="javascript:void(0)" class="cart-toggle">Cart (<span class="cart-count">0</span>)</a>
        </div>
    </header>

    <section class="hero">
        <img id="heroImage" src="" alt="Hero" class="hero-bg">
        <div class="hero-content">
            <h1>Mindful Living Spaces</h1>
            <p>Premium sustainable furniture, crafted for the planet.</p>
            <a href="#products" class="btn btn-primary">Explore Designs</a>
        </div>
    </section>

    <section id="products" class="products-container">
        <h2 class="section-title">Signature Pieces</h2>
        <div class="product-grid" id="productsGrid"></div>
    </section>

    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart">&times;</button>
        </div>
        <div id="cartItemsContainer"></div>
        <div class="cart-footer">
            <div class="subtotal">Subtotal: <span id="cartSubtotal">$0.00</span></div>
        </div>
    </div>
    <div id="overlay" class="overlay"></div>

    <script src="app.js"></script>
</body>
</html>
